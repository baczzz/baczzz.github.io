    /* Badge styling */

    .badge-red { background: #fee2e2; color: #b91c1c; }
    .badge-purple { background: #f3e8ff; color: #7e22ce; }

    .main-content { flex: 1; min-width: 0; }
    .sidebar { width: 240px; flex-shrink: 0; position: sticky; top: 1.5rem; }

    .q-text { font-size: 15px; color: var(--color-text-main); font-weight: 500; margin-bottom: 1rem; line-height: 1.6; }

    .pin-btn.active { background: #fef3c7; color: #b45309; border-color: #f59e0b; }

    .sidebar-num { height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--color-border); border-radius: var(--border-radius-md); font-size: 13px; font-weight: 500; cursor: pointer; background: var(--color-bg-card); color: var(--color-text-sub); transition: all 0.15s; }

    .sidebar-num.current { background: var(--color-text-main); color: #ffffff; border-color: var(--color-text-main); }

    .timer { font-size: 28px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--color-text-main); display: flex; align-items: center; gap: 6px; }
    .timer.warning { color: #d97706; }
    .timer.danger { color: #dc2626; animation: pulse 1s infinite; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    .split-container { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--border-radius-lg); overflow: hidden; padding: 1rem; }

    .split-right { flex: 0.9; overflow-y: auto; max-height: 550px; padding-left: 0.25rem; }
    .split-left::-webkit-scrollbar, .split-right::-webkit-scrollbar { width: 6px; }

const ENGINE = {
  filter(type, level){
    return DB.questions.filter(q=>{
      if(q.is_passage) return false;
      if(type!=="all" && q.type!==type) return false;
      if(level!=="all" && q.level!==level) return false;
      return true;
    });
  },
  shuffle(arr){
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
  },
  buildExam(config){
    let exam=[];
    const usedGroups=new Set();
    const typeList = config.type==="all" 
      ? ["ngu-phap","tu-vung","phat-am","tim-loi-sai","doc-hieu","duc-lo"] 
      : [config.type];

    typeList.forEach(t=>{
      if(t==="doc-hieu"){
        const groups=[...new Set(DB.questions.filter(q=>q.type==="doc-hieu"&&q.is_passage).map(q=>q.group_id))];
        const shuffledG=this.shuffle(groups);
        shuffledG.slice(0, config.docHieuGroups || 1).forEach(gid=>{
          if(!usedGroups.has(gid)){
            usedGroups.add(gid);
            const passage=DB.questions.find(q=>q.group_id===gid&&q.is_passage);
            const qs=DB.questions.filter(q=>q.group_id===gid&&!q.is_passage);
            if(passage) exam.push({...passage, _examType:"doc-hieu-passage"});
            qs.forEach(q=>exam.push({...q,_examType:"doc-hieu-q"}));
          }
        });
      } else if(t==="duc-lo"){
        const groups=[...new Set(DB.questions.filter(q=>q.type==="duc-lo"&&q.is_passage).map(q=>q.group_id))];
        const shuffledG=this.shuffle(groups);
        shuffledG.slice(0,1).forEach(gid=>{
          if(!usedGroups.has(gid)){
            usedGroups.add(gid);
            const passage=DB.questions.find(q=>q.group_id===gid&&q.is_passage);
            const qs=DB.questions.filter(q=>q.group_id===gid&&!q.is_passage);
            if(passage) exam.push({...passage,_examType:"duc-lo-passage"});
            qs.forEach(q=>exam.push({...q,_examType:"duc-lo-q"}));
          }
        });
      } else {
        const pool=this.shuffle(this.filter(t, config.level));
        pool.slice(0, config.countPerType).forEach(q=>exam.push({...q,_examType:t}));
      }
    });
    return exam;
  }
};

        <p style="font-size:12px;color:var(--color-text-sub);margin-bottom:6px;font-weight:600">ĐỘ KHÓ ĐỀ BÀI</p>
        <select id="cfg-level" style="width:100%">
          <option value="all"${state.config.level==="all"?" selected":""}>Tất cả cấp độ</option>
          <option value="easy"${state.config.level==="easy"?" selected":""}>Cơ bản (Easy)</option>
          <option value="medium"${state.config.level==="medium"?" selected":""}>Thông hiểu (Medium)</option>
          <option value="hard"${state.config.level==="hard"?" selected":""}>Vận dụng cao (Hard)</option>
        </select>
      </div>
      <div>
        <p style="font-size:12px;color:var(--color-text-sub);margin-bottom:6px;font-weight:600">SỐ CÂU / MỖI DẠNG ĐƠN</p>
        <input type="number" id="cfg-count" min="1" max="10" value="${state.config.countPerType}" style="width:100%">
      </div>
      <div>
        <p style="font-size:12px;color:var(--color-text-sub);margin-bottom:6px;font-weight:600">THỜI GIAN LÀM (PHÚT)</p>
        <input type="number" id="cfg-timer" min="1" max="120" value="${state.config.timer}" style="width:100%">
      </div>
    </div>
  </div>

  <div style="display:flex; gap:12px; flex-wrap:wrap">
    <button class="btn btn-primary" id="btn-start" style="padding: 12px 24px;"><i class="ti ti-arrows-shuffle"></i> Phát động Tạo đề ngẫu nhiên</button>
    ${mistakes.length>0 ? `
      <button class="btn" id="btn-mistakes" style="border-color:#f59e0b; color:#b45309; background:#fffbeb;"><i class="ti ti-history"></i> Ôn tập câu làm sai cũ (${mistakes.length})</button>
      <button class="btn" id="btn-clear-mistakes" style="color:#ef4444;"><i class="ti ti-trash"></i> Xóa lịch sử sai</button>
    ` : ""}
  </div>
</div>`;
}

function renderExam(){
  const nonPassage=state.exam.filter(q=>!q.is_passage);
  const timerColor=state.timeLeft<=60?"danger":state.timeLeft<=180?"warning":"";
  const mm=String(Math.floor(state.timeLeft/60)).padStart(2,"0");
  const ss=String(state.timeLeft%60).padStart(2,"0");

  const sidebarNums=nonPassage.map((q,i)=>{
    let cls="sidebar-num";
    if(state.pinned.has(q.id)) cls+=" pinned-s";
    else if(state.answers[q.id]!==undefined) cls+=" answered";
    if(i===state.currentQ) cls+=" current";
    return `<div class="${cls}" data-qjump="${i}">C${i+1}</div>`;
  }).join("");

  let questionsHtml="";
  let qCounter=0;

  // Lắp ghép giao diện tối ưu cho từng cụm dạng đề bài
  for(let i=0; i<state.exam.length; i++){
    const item=state.exam[i];
    if(item._examType==="doc-hieu-passage"){
      questionsHtml+=`<div class="split-container">
        <div class="split-left passage-box">
          <p style="font-size:11px;color:var(--color-text-sub);margin-bottom:6px;font-weight:600;text-transform:uppercase;"><i class="ti ti-file-text"></i> READING PASSAGE</p>
          <div style="margin-top:6px">${item.text}</div>
        </div>
        <div class="split-right">`;
      let j=i+1;
      while(j<state.exam.length && state.exam[j].group_id===item.group_id && !state.exam[j].is_passage){
        qCounter++;
        questionsHtml+=renderMCQ(state.exam[j], qCounter);
        j++;
      }
      questionsHtml+=`</div></div>`;
      i=j-1;
    } else if(item._examType==="duc-lo-passage"){
      questionsHtml+=renderDucLo(item, state.exam, i);
      let j=i+1;
      while(j<state.exam.length && state.exam[j].group_id===item.group_id) j++;
      qCounter += (j - (i + 1));
      i=j-1;
    } else if(!item.is_passage){
      qCounter++;
      questionsHtml+=renderMCQ(item, qCounter);
    }
  }

  return `
<div class="exam-layout">
  <div class="main-content">
    <div style="display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem; background:#fff; padding:12px; border-radius:var(--border-radius-md); border:1px solid var(--color-border)">
      <span class="timer ${timerColor}"><i class="ti ti-alarm"></i> ${mm}:${ss}</span>
      <span style="font-size:14px;color:var(--color-text-sub); font-weight:500;"> Tiến độ: ${Object.keys(state.answers).length}/${nonPassage.length} câu câu hoàn thành</span>
      <button class="btn btn-danger" id="btn-submit" style="margin-left:auto"><i class="ti ti-send"></i> Nộp Bài / Kết thúc</button>
    </div>
    ${questionsHtml}
  </div>
  
  <div class="sidebar">
    <div class="card" style="padding:1rem">
      <p style="font-size:11px;font-weight:600;color:var(--color-text-sub);margin-bottom:12px;text-transform:uppercase">Điều hướng nhanh</p>
      <div class="sidebar-grid">${sidebarNums}</div>
      <div style="display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--color-text-sub);border-top:1px solid var(--color-border);padding-top:10px">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:3px;background:#e0f2fe;border:1px solid #7dd3fc"></div>Đã tích đáp án</div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:3px;background:#fef3c7;border:1px solid #fcd34d"></div>Câu đánh dấu ghim</div>
      </div>
    </div>
  </div>
</div>`;
}

function renderMCQ(q, num){
  const sel=state.answers[q.id];
  const pinned=state.pinned.has(q.id);
  return `<div class="q-card${pinned?" pinned":""}" id="qcard-${q.id}">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <span class="q-num">Câu số ${num}</span>
      ${getLevelBadge(q.level)}
      ${getTypeBadge(q.type)}
      <button class="pin-btn${pinned?" active":""}" data-pin="${q.id}" style="margin-left:auto"><i class="ti ti-bookmark"></i> ${pinned?"Đã ghim":"Ghim câu"}</button>
    </div>
    <p class="q-text">${q.question}</p>
    <div class="options-container">
      ${q.options.map((o,i)=>`
        <button class="opt${sel===i?" selected":""}" data-ans="${q.id}" data-idx="${i}">
          <strong>${String.fromCharCode(65+i)}.</strong> ${o}
        </button>
      `).join("")}
    </div>
  </div>`;
}

function renderDucLo(passage, exam, startIdx){
  const qs=exam.filter(q=>q.group_id===passage.group_id&&!q.is_passage);
  let text=passage.text;
  
  qs.forEach((q,i)=>{
    const sel=state.answers[q.id];
    // Tạo cấu trúc select trực quan ngay trong đoạn văn bản đục lỗ
    const opts=q.options.map((o,idx)=>`<option value="${idx}"${sel===idx?" selected":""}>${String.fromCharCode(65+idx)}. ${o}</option>`).join("");
    const dropdown=`<select data-duc="${q.id}" style="margin:0 4px; padding:2px 6px; border-color:#0284c7; font-weight:600;"><option value="">(${i+1}) Chọn...</option>${opts}</select>`;
    text=text.replace(`(${i+1})_____`, dropdown);
  });

  return `<div class="card" style="margin-bottom:1.5rem">
    <p style="font-size:11px;font-weight:600;color:var(--color-text-sub);margin-bottom:8px;text-transform:uppercase;"><i class="ti ti-edit"></i> CLOZE TEST (Điền từ vào đoạn văn)</p>
    <div style="font-size:15px;line-height:2.2;text-align:justify; background:var(--color-bg-main); padding:1.25rem; border-radius:var(--border-radius-md)">${text}</div>
  </div>`;
}

function renderResult(){
  const nonPassage=state.exam.filter(q=>!q.is_passage);
  let correctCount=0;
  
  nonPassage.forEach(q=>{
    if(state.answers[q.id]===q.answer) correctCount++;
  });

  const pct=nonPassage.length > 0 ? Math.round((correctCount/nonPassage.length)*100) : 0;
  let rank="Cần cố gắng thêm"; let badgeCls="badge-red";
  if(pct>=85){ rank="Xuất Sắc"; badgeCls="badge-teal"; }
  else if(pct>=70){ rank="Khá Tốt"; badgeCls="badge-blue"; }
  else if(pct>=50){ rank="Trung Bình"; badgeCls="badge-amber"; }

  let reviewHtml="";
  let qc=0;

  nonPassage.forEach(q=>{
    qc++;
    const userAns=state.answers[q.id];
    const isCorrect=(userAns===q.answer);
    
    reviewHtml+=`<div class="q-card" style="border-left: 4px solid ${isCorrect?"#10b981":"#ef4444"}">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <span class="q-num">Câu hỏi ${qc}</span>
        <span class="badge ${isCorrect?"badge-teal":"badge-red"}">${isCorrect?"<i class='ti ti-check'></i> ĐÚNG":"<i class='ti ti-x'></i> SAI"}</span>
        ${getTypeBadge(q.type)}
      </div>
      <p class="q-text" style="font-size:14px; margin-bottom:10px;">${q.question}</p>
      
      <div style="font-size:13px; margin-bottom:8px">
        ${userAns!==undefined ? `<div><span style="color:var(--color-text-sub)">Lựa chọn của bạn:</span> <strong style="color:${isCorrect?"#0f766e":"#b91c1c"}">${String.fromCharCode(65+userAns)}. ${q.options[userAns]}</strong></div>` : "<div style='color:#b91c1c'>Bạn chưa trả lời câu này!</div>"}
        <div><span style="color:var(--color-text-sub)">Đáp án chuẩn xác:</span> <strong style="color:#0f766e">${String.fromCharCode(65+q.answer)}. ${q.options[q.answer]}</strong></div>
      </div>
      
      <div style="margin-top:10px; padding-top:8px; border-top:1px dashed var(--color-border); font-size:13px; color:var(--color-text-sub); background:#f8fafc; padding:8px; border-radius:4px;">
        <strong><i class="ti ti-bulb"></i> Phân tích giải thích:</strong> ${q.explanation || "Chưa cập nhật dữ liệu giải thích chi tiết."}
      </div>
    </div>`;
  });

  return `
<div style="max-width:800px; margin: 0 auto">
  <div class="card" style="margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center;flex-wrap:wrap">
    <div>
      <p style="font-size:14px;color:var(--color-text-sub);font-weight:500;">KẾT QUẢ ĐẠT ĐƯỢC</p>
      <p style="font-size:46px;font-weight:600;color:var(--color-text-main);line-height:1">${correctCount}<span style="font-size:22px;color:var(--color-text-muted)">/${nonPassage.length}</span></p>
    </div>
    <div>
      <p style="font-size:13px;color:var(--color-text-sub)">Tỷ lệ chính xác</p>
      <p style="font-size:24px;font-weight:600;color:var(--color-text-main)">${pct}%</p>
    </div>
    <div>
      <span class="badge ${badgeCls}" style="font-size:14px;padding:6px 16px; border-radius:6px">${rank}</span>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn" id="btn-retry"><i class="ti ti-refresh"></i> Luyện lại đề này</button>
      <button class="btn btn-primary" id="btn-new"><i class="ti ti-home"></i> Cấu hình đề mới</button>
    </div>
  </div>

  <h3 style="font-size:15px;font-weight:600;color:var(--color-text-main);margin-bottom:12px; text-transform:uppercase"><i class="ti ti-list-check"></i> Xem lại chi tiết bài làm</h3>
  ${reviewHtml}
</div>`;
}

function getLevelBadge(l){
  const map={easy:["badge-teal","Dễ"],medium:["badge-blue","Trung Bình"],hard:["badge-red","Vận Dụng Cao"]};
  const [cls,label]=map[l]||["badge-blue",l];
  return `<span class="badge ${cls}">${label}</span>`;
}
function getTypeBadge(t){
  const map={"ngu-phap":"Ngữ pháp","tu-vung":"Từ vựng","phat-am":"Phát âm","tim-loi-sai":"Lỗi sai","doc-hieu":"Đọc hiểu","duc-lo":"Đục lỗ"};
  return `<span class="badge badge-purple">${map[t]||t}</span>`;
}

function startTimer(){
  clearInterval(state.timerInterval);
  state.timerInterval=setInterval(()=>{
    state.timeLeft--;
    if(state.timeLeft<=0){ submitExam(); }
    else{
      const el=document.querySelector(".timer");
      if(el){
        const mm=String(Math.floor(state.timeLeft/60)).padStart(2,"0");
        const ss=String(state.timeLeft%60).padStart(2,"0");
        el.innerHTML=`<i class="ti ti-alarm"></i> ${mm}:${ss}`;
        el.className="timer"+(state.timeLeft<=60?" danger":state.timeLeft<=180?" warning":"");
      }
    }
  },1000);
}

function submitExam(){
  clearInterval(state.timerInterval);
  const nonPassage=state.exam.filter(q=>!q.is_passage);
  nonPassage.forEach(q=>{
    const ans=state.answers[q.id];
    if(ans!==q.answer) saveMistake(q.id);
  });
  state.view="result";
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function attachEvents(){
  document.querySelectorAll("[data-cfg]").forEach(el=>{
    el.onclick=()=>{ state.config[el.dataset.cfg]=el.dataset.val; render(); };
  });
  
  const lvlEl=document.getElementById("cfg-level");
  if(lvlEl) lvlEl.onchange=e=>{ state.config.level=e.target.value; };
  const cntEl=document.getElementById("cfg-count");
  if(cntEl) cntEl.onchange=e=>{ state.config.countPerType=parseInt(e.target.value)||2; };
  const tmrEl=document.getElementById("cfg-timer");
  if(tmrEl) tmrEl.onchange=e=>{ state.config.timer=parseInt(e.target.value)||15; };

  const startBtn=document.getElementById("btn-start");
  if(startBtn) startBtn.onclick=()=>{
    state.exam=ENGINE.buildExam(state.config);
    if(state.exam.length === 0){ alert("Không có câu hỏi nào khớp với bộ lọc cấu hình hiện tại! Vui lòng mở rộng bộ lọc."); return; }
    state.answers={}; state.pinned=new Set(); state.currentQ=0;
    state.timeLeft=state.config.timer*60;
    state.view="exam";
    render();
    startTimer();
  };

  const mistakeBtn=document.getElementById("btn-mistakes");
  if(mistakeBtn) mistakeBtn.onclick=()=>{
    const ids=getMistakes();
    state.exam=DB.questions.filter(q=>ids.includes(q.id)&&!q.is_passage).map(q=>({...q,_examType:q.type}));
    state.answers={}; state.pinned=new Set(); state.currentQ=0;
    state.timeLeft=state.config.timer*60;
    state.view="exam";
    render();
    startTimer();
  };

  const clearMBtn = document.getElementById("btn-clear-mistakes");
  if(clearMBtn) clearMBtn.onclick=()=>{ if(confirm("Bạn có chắc muốn xóa lịch sử các câu làm sai không?")) clearMistakes(); };

  document.querySelectorAll("[data-ans]").forEach(el=>{
    el.onclick=()=>{
      const qid = el.dataset.ans;
      state.answers[qid]=parseInt(el.dataset.idx);
      const nonPassage=state.exam.filter(q=>!q.is_passage);
      state.currentQ=nonPassage.findIndex(q=>q.id===qid);
      render();
    };
  });

  document.querySelectorAll("[data-duc]").forEach(el=>{
    el.onchange=()=>{
      if(el.value!=="") {
        state.answers[el.dataset.duc]=parseInt(el.value);
        // Tự động cập nhật trạng thái làm bài ở sidebar điều hướng
        const nonPassage=state.exam.filter(q=>!q.is_passage);
        state.currentQ=nonPassage.findIndex(q=>q.id===el.dataset.duc);
      } else {
        delete state.answers[el.dataset.duc];
      }
    };
  });

  document.querySelectorAll("[data-pin]").forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.pin;
      if(state.pinned.has(id)) state.pinned.delete(id);
      else state.pinned.add(id);
      render();
    };
  });

  document.querySelectorAll("[data-qjump]").forEach(el=>{
    el.onclick=()=>{
      const idx=parseInt(el.dataset.qjump);
      state.currentQ=idx;
      const nonP=state.exam.filter(q=>!q.is_passage);
      const targetId="qcard-"+nonP[idx]?.id;
      const target=document.getElementById(targetId);
      if(target) target.scrollIntoView({behavior:"smooth",block:"center"});
      render();
    };
  });

  const submitBtn=document.getElementById("btn-submit");
  if(submitBtn) submitBtn.onclick=()=>{ if(confirm("Bạn có chắc chắn muốn nộp bài chấm điểm ngay không?")) submitExam(); };
  
  const retryBtn=document.getElementById("btn-retry");
  if(retryBtn) retryBtn.onclick=()=>{ state.answers={}; state.pinned=new Set(); state.currentQ=0; state.timeLeft=state.config.timer*60; state.view="exam"; render(); startTimer(); };
  
  const newBtn=document.getElementById("btn-new");
  if(newBtn) newBtn.onclick=()=>{ clearInterval(state.timerInterval); state.view="config"; render(); };
}

render();
</script>
</body>
</html>
