<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Letter - Huyn Chau</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(ellipse at 40% 40%, #1a1040, #0f1535 70%);
    min-height: 100vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    overflow: hidden;
    padding-bottom: 40px;
  }

  /* ===== ENVELOPE (always at bottom) ===== */
  .envelope {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    height: 210px;
    cursor: pointer;
    z-index: 10;
  }

  .env-back {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #c2185b, #880e4f);
    border-radius: 6px 6px 12px 12px;
    box-shadow: 0 16px 50px rgba(136,14,79,0.7);
  }
  /* side folds */
  .env-back::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom right, #ad1457 50%, transparent 50%),
      linear-gradient(to bottom left,  #880e4f 50%, transparent 50%);
    background-size: 50% 100%;
    background-position: left, right;
    background-repeat: no-repeat;
    opacity: 0.5;
    border-radius: 6px 6px 12px 12px;
  }

  .env-flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 116px;
    transform-origin: top center;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
    z-index: 15;
  }
  .env-flap svg { width: 100%; height: 100%; display: block; }

  .seal {
    position: absolute;
    top: 68px; left: 50%;
    transform: translateX(-50%);
    font-size: 2.2rem;
    z-index: 20;
    filter: drop-shadow(0 0 10px #ff80ab);
    transition: opacity 0.3s 0s, transform 0.3s;
  }

  .hint {
    position: absolute;
    bottom: -30px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.45);
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: opacity 0.3s;
  }

  /* flap open */
  .envelope.open .env-flap { transform: rotateX(-175deg); }
  .envelope.open .seal { opacity: 0; }
  .envelope.open .hint { opacity: 0; }

  /* ===== CARD (separate, always above envelope) ===== */
  .card {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(320px); /* hidden behind envelope */
    width: 290px;
    background: #f9c8d0;
    border-radius: 16px;
    padding: 22px 18px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 30; /* always on top */
    opacity: 0;
    box-shadow: 0 16px 48px rgba(0,0,0,0.45);
    transition:
      transform 0.75s cubic-bezier(0.34,1.4,0.64,1) 0.3s,
      opacity   0.5s ease 0.3s;
    cursor: pointer;
    pointer-events: none;
  }
  .card.visible {
    transform: translateX(-50%) translateY(-250px);
    opacity: 1;
    pointer-events: all;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background-image: radial-gradient(circle, rgba(255,255,255,0.3) 2px, transparent 2px);
    background-size: 20px 20px;
    pointer-events: none;
  }

  .page-title {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #ad1457;
    margin-bottom: 10px;
  }

  /* ===== CAKE ===== */
  .cake-scene {
    position: relative;
    width: 185px;
    height: 195px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    margin-bottom: 12px;
  }

  .candle-wrap {
    position: absolute;
    bottom: 182px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    z-index: 10;
  }
  .flame-outer {
    width: 14px; height: 23px;
    background: radial-gradient(ellipse at 50% 85%, #fff8e1, #ffcc02 40%, #ff9800 80%, transparent);
    border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
    animation: flicker .7s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 7px #ffcc02);
    position: relative;
  }
  .flame-inner {
    position: absolute; bottom: 3px; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 10px;
    background: radial-gradient(ellipse at 50% 80%, #fff, #ffe082);
    border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
  }
  @keyframes flicker {
    0%   { transform: scaleX(1) scaleY(1) rotate(-4deg); }
    100% { transform: scaleX(.88) scaleY(1.08) rotate(4deg); }
  }
  .candle-body {
    width: 10px; height: 34px;
    background: linear-gradient(to right, #f5f5f5, #fff 40%, #e0e0e0);
    border-radius: 5px 5px 2px 2px;
  }

  .cake {
    position: absolute; bottom: 8px;
    display: flex; flex-direction: column; align-items: center;
  }

  .tier { position: relative; }
  .tier .cap {
    background: #f2e6d6;
    border-radius: 50% / 80%;
    position: relative; z-index: 2;
  }
  .tier .body {
    background: linear-gradient(to right, #6d4027, #8b5e3c, #6d4027);
    position: relative; overflow: visible;
  }

  .frost {
    position: absolute;
    top: -1px; left: 0; right: 0;
    display: flex; justify-content: space-around;
    padding: 0 4px; z-index: 4;
  }
  .drip {
    background: #f2e6d6;
    border-radius: 0 0 50% 50%;
    width: 12px;
  }

  .sb-row {
    position: absolute;
    top: -20px; left: 0; right: 0;
    display: flex; justify-content: space-around;
    padding: 0 5px; z-index: 6;
  }
  .sb {
    font-size: .95rem;
    animation: sbBob 2s ease-in-out infinite alternate;
    animation-delay: var(--d, 0s);
    display: block;
  }
  @keyframes sbBob {
    from { transform: translateY(0); }
    to   { transform: translateY(-3px); }
  }

  .t1 { width: 68px; }
  .t1 .cap  { height: 8px; }
  .t1 .body { height: 34px; }
  .t1 .frost .drip { height: 10px; }

  .t2 { width: 112px; margin-top: -2px; }
  .t2 .cap  { height: 10px; }
  .t2 .body { height: 42px; }
  .t2 .frost .drip { height: 12px; }

  .t3 { width: 158px; margin-top: -2px; }
  .t3 .cap  { height: 12px; }
  .t3 .body { height: 50px; }
  .t3 .frost .drip { height: 15px; }

  .plate {
    width: 176px; height: 12px;
    background: linear-gradient(to bottom, #f2e6d6, #d9c4a8);
    border-radius: 50%;
    margin-top: -1px;
    box-shadow: 0 4px 10px rgba(80,40,0,.2);
  }

  .card-text { text-align: center; }
  .card-text .happy {
    font-family: 'Great Vibes', cursive;
    font-size: 1.8rem; color: #5c3317; line-height: 1.2;
  }
  .card-text .name {
    font-family: 'Great Vibes', cursive;
    font-size: 1.25rem; color: #7a4528; margin-top: 2px;
  }
  .card-text .age {
    font-size: .82rem; color: #9b6644;
    letter-spacing: 3px; margin-top: 5px;
  }

  /* hearts */
  .hearts { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .heart {
    position:absolute; bottom:-40px; left:var(--x);
    font-size:var(--fs,1rem); opacity:0;
    animation: floatUp var(--dur,6s) var(--delay,0s) infinite ease-in;
  }
  @keyframes floatUp {
    0%  { opacity:0; transform:translateY(0) scale(.5); }
    10% { opacity:.7; }
    90% { opacity:.3; }
    100%{ opacity:0; transform:translateY(-110vh) rotate(20deg) scale(1); }
  }
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<!-- CARD: always z=30, above everything -->
<div class="card" id="card" onclick="closeCard()">
  <div class="page-title">Birthday Cake</div>
  <div class="cake-scene">
    <div class="candle-wrap">
      <div class="flame-outer"><div class="flame-inner"></div></div>
      <div class="candle-body"></div>
    </div>
    <div class="cake">
      <div class="tier t1">
        <div class="sb-row">
          <span class="sb" style="--d:.1s">🍓</span>
          <span class="sb" style="--d:.5s">🍓</span>
        </div>
        <div class="cap"></div>
        <div class="body">
          <div class="frost">
            <div class="drip"></div><div class="drip"></div><div class="drip"></div>
          </div>
        </div>
      </div>
      <div class="tier t2">
        <div class="sb-row">
          <span class="sb" style="--d:0s">🍓</span>
          <span class="sb" style="--d:.4s">🍓</span>
          <span class="sb" style="--d:.7s">🍓</span>
        </div>
        <div class="cap"></div>
        <div class="body">
          <div class="frost">
            <div class="drip"></div><div class="drip"></div><div class="drip"></div><div class="drip"></div>
          </div>
        </div>
      </div>
      <div class="tier t3">
        <div class="sb-row">
          <span class="sb" style="--d:.2s">🍓</span>
          <span class="sb" style="--d:.6s">🍓</span>
          <span class="sb" style="--d:.9s">🍓</span>
          <span class="sb" style="--d:.35s">🍓</span>
        </div>
        <div class="cap"></div>
        <div class="body">
          <div class="frost">
            <div class="drip"></div><div class="drip"></div><div class="drip"></div><div class="drip"></div><div class="drip"></div>
          </div>
        </div>
      </div>
      <div class="plate"></div>
    </div>
  </div>
  <div class="card-text">
    <div class="happy">happy birthday!</div>
    <div class="name">— Huyn Chau —</div>
    <div class="age">✦ 17+ ✦</div>
  </div>
</div>

<!-- ENVELOPE: click to open -->
<div class="envelope" id="envelope" onclick="openEnvelope()">
  <div class="env-back"></div>
  <div class="env-flap">
    <svg viewBox="0 0 320 116" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f48fb1"/>
          <stop offset="100%" stop-color="#c2185b"/>
        </linearGradient>
      </defs>
      <polygon points="0,0 320,0 160,112" fill="url(#fg)"/>
    </svg>
  </div>
  <div class="seal">💌</div>
  <div class="hint">Nhấn để mở ✉</div>
</div>

<script>
  function openEnvelope() {
    document.getElementById('envelope').classList.add('open');
    setTimeout(() => {
      document.getElementById('card').classList.add('visible');
    }, 100);
  }

  function closeCard() {
    const card = document.getElementById('card');
    const env  = document.getElementById('envelope');
    card.classList.remove('visible');
    setTimeout(() => {
      env.classList.remove('open');
    }, 400);
  }

  // floating hearts
  const el = document.getElementById('hearts');
  ['💕','💖','🌸','✨','💝','🎀'].forEach(e => {
    for(let j=0;j<3;j++){
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = e;
      h.style.cssText = `--x:${8+Math.random()*84}%;--dur:${5+Math.random()*6}s;--delay:${Math.random()*9}s;--fs:${0.7+Math.random()*1.1}rem`;
      el.appendChild(h);
    }
  });
</script>
</body>
</html>
